- name: Aashish Manglik
  position: Assistant Professor, Department of Pharmaceutical Chemistry and Department of Anesthesia
  ucsf_profile: "http://profiles.ucsf.edu/aashish.manglik"
  email: aashish.manglik@ucsf.edu
  twitter: AashishManglik
  image: "/assets/img/aashish-manglik.jpg"
  avatar: "/assets/img/aashish-manglik.jpg"
  current: True
  bio: Aashish was an undergraduate at Washington University in St. Louis, where he worked in the lab of Jeff McKinney on *Salmonella*-host interactions. He moved to California in 2008 to join the Stanford Medical Scientist Training Program. There, he worked with Brian Kobilka as a graduate student to elucidate different aspects of GPCR function, resulting in a number of important contributions to our current understanding of opioid and adrenergic receptors. After finishing his medical training in May 2016, Aashish began his independent research career as the first Stanford Distinguished Fellow at Stanford University School of Medicine within the Department of Molecular and Cellular Physiology. He subsequently began as an assistant professor at UCSF in fall of 2017.

