  bio: Ben received his undergraduate degree from San Jose State University. While there he studied synapse formation and maintenance in the laboratory of Miri VanHoven. Currently, Ben is a graduate student in the von Zastrow and Manglik laboratories where he is developing new tools to study the role of β-arrestin in GPCR signaling and trafficking.
